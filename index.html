<!DOCTYPE html>
<html>
<head>
  <title>My GitHub Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f4f4f4;
      color: #333;
    }
    header {
      background-color: #4CAF50;
      color: white;
      padding: 1em 0;
      text-align: center;
    }
    main {
      padding: 2em;
    }
    footer {
      background-color: #4CAF50;
      color: white;
      padding: 1em 0;
      text-align: center;
      position: fixed;
      bottom: 0;
      width: 100%;
    }
  </style>
</head>
<body>
  <header>
    <h1>Welcome to My GitHub Page</h1>
  </header>
  <main>
    <p>This is my first GitHub Pages website!</p>
    <h2>About Me</h2>
    <p>Write something about yourself here.</p>
    <h2>Projects</h2>
    <p>List your projects here.</p>
    <h2>Contact</h2>
    <p>Include your contact information or links to social media here.</p>
  </main>
  <footer>
    <p>&copy; 2024 Your Name</p>
  </footer>
</body>
</html>
